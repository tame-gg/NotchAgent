name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to build. Leave empty to use Info.plist.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build latest NotchAgent release
    runs-on: macos-15
    env:
      BUILD_ARCH: universal
      NOTARY_PROFILE: NotchAgent

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+){1,3}([.-][A-Za-z0-9]+)?$ ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"
          echo "Building NotchAgent $VERSION"

      - name: Select Xcode 26
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -type d | sort | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26 is required for the macOS release build" >&2
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"

      - name: Show build environment
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          uname -m

      - name: Verify DMG tooling
        run: command -v hdiutil

      - name: Import Developer ID signing assets
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -z "${APPLE_CERTIFICATE_BASE64:-}" || -z "${APPLE_CERTIFICATE_PASSWORD:-}" || -z "${DEVELOPER_ID_APPLICATION:-}" ]]; then
            echo "::notice::Developer ID signing secrets are missing; building an unsigned DMG."
            echo "SKIP_SIGN=1" >> "$GITHUB_ENV"
            echo "SKIP_NOTARIZE=1" >> "$GITHUB_ENV"
            exit 0
          fi

          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$(uuidgen)}"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/notchagent-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "SIGN_IDENTITY=$DEVELOPER_ID_APPLICATION" >> "$GITHUB_ENV"

          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            xcrun notarytool store-credentials "$NOTARY_PROFILE" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD"
          else
            echo "::notice::Notarization secrets are missing; skipping notarization."
            echo "SKIP_NOTARIZE=1" >> "$GITHUB_ENV"
          fi

      - name: Build DMG
        run: ./scripts/build-dmg.sh "$VERSION"

      - name: Verify DMG contents
        shell: bash
        run: |
          require_archs() {
            local path="$1"
            shift
            local archs
            archs="$(lipo -archs "$path")"
            echo "$path: $archs"
            for arch in "$@"; do
              [[ " $archs " == *" $arch "* ]]
            done
            test "$(wc -w <<< "$archs" | tr -d ' ')" -eq "$#"
          }

          require_archs .build/dmg-staging/NotchAgent.app/Contents/MacOS/NotchAgent arm64 x86_64
          require_archs .build/dmg-staging/NotchAgent.app/Contents/Helpers/notchagent-bridge arm64 x86_64
          require_archs .build/dmg-staging/NotchAgent.app/Contents/Helpers/notchagent-cli arm64 x86_64
          require_archs .build/dmg-staging/NotchAgent.app/Contents/Frameworks/Sparkle.framework/Sparkle arm64 x86_64
          ls -lh .build/NotchAgent.dmg

      - name: Generate GitHub Releases appcast
        shell: bash
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p .build
          if [[ -z "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "::notice::SPARKLE_PRIVATE_KEY is missing; skipping Sparkle appcast generation."
            echo "APPCAST_READY=0" >> "$GITHUB_ENV"
            exit 0
          fi
          ./scripts/update-appcast.sh "$VERSION" .build/NotchAgent.dmg
          cp appcast.xml .build/appcast.xml
          echo "APPCAST_READY=1" >> "$GITHUB_ENV"

      - name: Extract release notes
        shell: bash
        run: |
          mkdir -p .build
          if ./scripts/extract-changelog.sh "$VERSION" > .build/release-notes.md; then
            :
          else
            printf 'NotchAgent %s\n' "$VERSION" > .build/release-notes.md
          fi

      - name: Publish GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(.build/NotchAgent.dmg)
          if [[ "${APPCAST_READY:-0}" == "1" ]]; then
            assets+=(.build/appcast.xml)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" "${assets[@]}" \
              --title "NotchAgent $TAG" \
              --notes-file .build/release-notes.md
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NotchAgent-${{ env.VERSION }}-release-assets
          path: |
            .build/NotchAgent.dmg
            .build/appcast.xml
          if-no-files-found: error
